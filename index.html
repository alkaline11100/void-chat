<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
:root{--void:#020005;--glow:#7b2fff;--glow2:#ff2fd6;--glow3:#00ffcc;--glow4:#ffaa00;--text:#e0d0ff;--muted:#5a3a8a;--danger:#ff2f2f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow:hidden;position:relative;}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
@keyframes rainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes rgbshift{0%{text-shadow:2px 0 #ff0000,-2px 0 #00ffff,0 0 30px var(--glow),0 0 60px var(--glow2)}25%{text-shadow:2px 0 #ff00ff,-2px 0 #00ff00,0 0 40px var(--glow2),0 0 80px var(--glow3)}50%{text-shadow:-2px 0 #00ffff,2px 0 #ff0000,0 0 30px var(--glow3),0 0 60px var(--glow4)}75%{text-shadow:-2px 0 #ffff00,2px 0 #ff00ff,0 0 40px var(--glow4),0 0 80px var(--glow)}100%{text-shadow:2px 0 #ff0000,-2px 0 #00ffff,0 0 30px var(--glow),0 0 60px var(--glow2)}}
@keyframes borderRave{0%{border-color:#ff00ff;box-shadow:0 0 20px #ff00ff}16%{border-color:#ff6600;box-shadow:0 0 20px #ff6600}33%{border-color:#ffff00;box-shadow:0 0 20px #ffff00}50%{border-color:#00ff88;box-shadow:0 0 20px #00ff88}66%{border-color:#00ccff;box-shadow:0 0 20px #00ccff}83%{border-color:#aa00ff;box-shadow:0 0 20px #aa00ff}100%{border-color:#ff00ff;box-shadow:0 0 20px #ff00ff}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes vhsWobble{0%,100%{transform:skewX(0deg)}48%{transform:skewX(0deg)}50%{transform:skewX(1.5deg)}52%{transform:skewX(-1deg)}54%{transform:skewX(0deg)}}
.scanline{position:fixed;top:0;left:0;width:100%;height:6px;background:linear-gradient(transparent,rgba(255,0,255,0.08),transparent);z-index:5;pointer-events:none;animation:scanline 3s linear infinite;}
.scanline2{position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(transparent,rgba(0,255,200,0.06),transparent);z-index:5;pointer-events:none;animation:scanline 5s linear infinite reverse;}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity 0.6s;animation:vhsWobble 8s infinite;}
.screen.hidden{opacity:0;pointer-events:none;}
#landing h1{font-family:'VT323',monospace;font-size:clamp(2rem,6vw,4.5rem);text-align:center;color:#fff;animation:rgbshift 2s infinite,flicker 4s infinite;line-height:1.1;}
#landing p.sub{margin-top:18px;font-size:.75rem;color:#aa88ff;text-align:center;font-style:italic;max-width:340px;text-shadow:0 0 10px #aa88ff;}
#landing .taglines{margin-top:10px;font-family:'VT323',monospace;font-size:1.3rem;color:#00ffcc;text-align:center;min-height:1.5rem;text-shadow:0 0 12px #00ffcc;animation:rainbow 4s linear infinite;}
.flag-picker{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.flag-picker label{font-family:'VT323',monospace;font-size:1.1rem;letter-spacing:1px;color:#ff00ff;text-shadow:0 0 10px #ff00ff;}
.flag-picker select{background:#0a0010;color:#e0d0ff;border:1px solid #7b2fff;padding:8px 14px;font-family:'Space Mono',monospace;font-size:.8rem;border-radius:4px;outline:none;cursor:pointer;max-width:260px;width:100%;animation:borderRave 3s linear infinite;}
.btn{margin-top:24px;padding:12px 36px;background:transparent;font-family:'VT323',monospace;font-size:1.4rem;letter-spacing:3px;cursor:pointer;transition:all .2s;text-transform:uppercase;animation:borderRave 2s linear infinite;}
.btn:hover{color:#000!important;animation:none;background:linear-gradient(90deg,#ff00ff,#00ffcc,#ffaa00);border-color:transparent;box-shadow:0 0 40px #ff00ff,0 0 80px #00ffcc;}
.btn.danger{border-color:var(--danger);color:var(--danger);animation:none;border:1px solid var(--danger);}
.btn.danger:hover{background:var(--danger);color:#000;box-shadow:0 0 30px var(--danger);}
.btn.pink{border:1px solid var(--glow2);color:var(--glow2);animation:borderRave 2s linear infinite;}
.btn.pink:hover{background:var(--glow2);color:#000;}
#queue-screen .orb{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,#ff00ff,#00ffcc,transparent);animation:pulse 1s infinite,rainbow 2s linear infinite;margin-bottom:24px;}
#queue-screen h2{font-family:'VT323',monospace;font-size:2.2rem;text-align:center;animation:rgbshift 1.5s infinite;}
#queue-screen p{margin-top:10px;font-size:.7rem;color:#aa88ff;text-align:center;}
#queue-count{color:#00ffcc;}
#chat-screen{justify-content:flex-start;padding:0;}
.chat-header{width:100%;padding:12px 20px;border-bottom:1px solid #2a0040;display:flex;align-items:center;gap:12px;background:rgba(2,0,5,.92);backdrop-filter:blur(10px);flex-shrink:0;animation:borderRave 3s linear infinite;border-bottom-width:1px;}
.chat-header .peer-info{display:flex;align-items:center;gap:8px;flex:1;}
.chat-header .flag-display{font-size:1.6rem;}
.chat-header .peer-label{font-family:'VT323',monospace;font-size:1.2rem;animation:rgbshift 3s infinite;}
.messages{flex:1;width:100%;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#5a3a8a transparent;}
.msg{max-width:70%;padding:10px 14px;border-radius:2px;font-size:.8rem;line-height:1.5;animation:msgIn .2s ease;}
.msg.mine{align-self:flex-end;background:rgba(123,47,255,.15);border-left:2px solid #ff00ff;color:#e0d0ff;box-shadow:0 0 10px rgba(255,0,255,.2);}
.msg.theirs{align-self:flex-start;background:rgba(0,255,204,.07);border-left:2px solid #00ffcc;color:#ccffee;box-shadow:0 0 10px rgba(0,255,204,.15);}
.msg .msg-flag{font-size:.9rem;margin-right:4px;}
.msg .msg-time{font-size:.6rem;color:var(--muted);margin-top:4px;display:block;}
.system-msg{text-align:center;font-size:.65rem;color:#ff00ff;font-style:italic;padding:4px 0;text-shadow:0 0 8px #ff00ff;}
.chat-input-area{width:100%;padding:12px 16px;border-top:1px solid #2a0040;display:flex;gap:10px;background:rgba(2,0,5,.97);flex-shrink:0;}
.chat-input-area input{flex:1;background:#0a0010;border:1px solid #5a3a8a;color:#e0d0ff;font-family:'Space Mono',monospace;font-size:.8rem;padding:10px 14px;border-radius:2px;outline:none;transition:all .3s;}
.chat-input-area input:focus{border-color:#ff00ff;box-shadow:0 0 15px rgba(255,0,255,.3);}
.chat-input-area button{background:linear-gradient(135deg,#7b2fff,#ff2fd6);border:none;color:#fff;font-family:'VT323',monospace;font-size:1.2rem;padding:0 18px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.chat-input-area button:hover{background:linear-gradient(135deg,#00ffcc,#ff00ff);box-shadow:0 0 20px #ff00ff;color:#000;}
.chat-actions{display:flex;gap:8px;padding:0 16px 12px;background:rgba(2,0,5,.97);flex-shrink:0;}
.chat-actions button{flex:1;padding:8px;font-family:'VT323',monospace;font-size:1rem;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;}
#btn-dm{background:transparent;border:1px solid #00ffcc;color:#00ffcc;}
#btn-dm:hover{background:#00ffcc;color:#000;box-shadow:0 0 20px #00ffcc;}
#btn-leave{background:transparent;border:1px solid var(--danger);color:var(--danger);}
#btn-leave:hover{background:var(--danger);color:#000;}
.typing-indicator{display:none;align-self:flex-start;padding:8px 14px;background:rgba(0,255,204,.05);border-left:2px solid #00ffcc;font-size:.7rem;color:#00ffcc;font-style:italic;text-shadow:0 0 8px #00ffcc;}
.typing-indicator.visible{display:block;}
#dm-screen{justify-content:flex-start;padding:0;}
.dm-header{width:100%;padding:16px 20px;border-bottom:1px solid #2a0040;display:flex;align-items:center;gap:12px;background:rgba(2,0,5,.9);flex-shrink:0;}
.dm-header h2{font-family:'VT323',monospace;font-size:1.6rem;animation:rgbshift 2s infinite;flex:1;}
.dm-list{flex:1;width:100%;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.dm-item{padding:12px 16px;border:1px solid #2a0040;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;}
.dm-item:hover{border-color:#ff00ff;box-shadow:0 0 15px rgba(255,0,255,.3);background:rgba(255,0,255,.05);}
.dm-item .dm-flag{font-size:1.4rem;}
.dm-item .dm-info{flex:1;}
.dm-item .dm-info .dm-name{font-size:.85rem;color:#e0d0ff;}
.dm-item .dm-info .dm-preview{font-size:.65rem;color:#5a3a8a;margin-top:2px;}
.empty-state{text-align:center;color:#5a3a8a;font-size:.75rem;margin-top:40px;font-style:italic;}
#dm-convo-screen{justify-content:flex-start;padding:0;}
#online-count{position:fixed;bottom:12px;right:16px;z-index:20;font-size:.65rem;color:#5a3a8a;}
#online-count span{color:#00ffcc;text-shadow:0 0 8px #00ffcc;}
.void-eye{font-size:3.5rem;margin-bottom:8px;display:block;text-align:center;animation:rainbow 2s linear infinite,pulse 2s infinite;}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.2}94%{opacity:1}96%{opacity:.5}97%{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 30px #ff00ff}50%{box-shadow:0 0 80px #00ffcc,0 0 140px #ffaa00}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitch{0%,100%{transform:translate(0) skewX(0)}20%{transform:translate(-3px,1px) skewX(2deg)}40%{transform:translate(3px,-1px) skewX(-2deg)}60%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px) skewX(1deg)}}
.glitch{animation:glitch .12s infinite;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:linear-gradient(#ff00ff,#00ffcc);border-radius:2px;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="scanline"></div>
<div class="scanline2"></div>

<div class="screen" id="landing">
  <span class="void-eye">👁</span>
  <h1>talk to someone<br/>in the void</h1>
  <div class="taglines" id="tagline"></div>
  <p class="sub">you are not alone. but you are.</p>
  <div class="flag-picker">
    <label id="flag-label">// origin unknown</label>
    <select id="country-select"></select>
  </div>
  <button class="btn" id="btn-enter">enter the void</button>
  <button class="btn pink" style="margin-top:10px;font-size:1rem;" id="btn-open-dm">📬 messages</button>
</div>

<div class="screen hidden" id="queue-screen">
  <div class="orb"></div>
  <h2>drifting through the void...</h2>
  <p>searching for another soul &nbsp;<span id="queue-count"></span></p>
  <button class="btn danger" style="margin-top:30px;" id="btn-cancel-queue">leave the void</button>
</div>

<div class="screen hidden" id="chat-screen">
  <div class="chat-header">
    <div class="peer-info">
      <span class="flag-display" id="peer-flag">👁</span>
      <div>
        <div class="peer-label">stranger <span id="peer-country-name"></span></div>
        <div style="font-size:.6rem;color:var(--muted)" id="chat-status">// connected to the void</div>
      </div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="system-msg">// you have found each other in the dark</div>
  </div>
  <div class="typing-indicator" id="typing-indicator">// stranger is composing something...</div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="say something into the void..." maxlength="500"/>
    <button id="btn-send">SEND</button>
  </div>
  <div class="chat-actions">
    <button id="btn-dm">💌 dm this stranger</button>
    <button id="btn-leave">disconnect</button>
  </div>
</div>

<div class="screen hidden" id="dm-screen">
  <div class="dm-header">
    <button class="btn" style="margin:0;padding:6px 14px;font-size:1rem;" id="btn-back-from-dm">← back</button>
    <h2>📬 echoes from the void</h2>
  </div>
  <div class="dm-list" id="dm-list"></div>
</div>

<div class="screen hidden" id="dm-convo-screen">
  <div class="chat-header">
    <button class="btn" style="margin:0;padding:6px 14px;font-size:.9rem;" id="btn-back-from-convo">← back</button>
    <div class="peer-info" style="margin-left:10px;">
      <span class="flag-display" id="dm-peer-flag"></span>
      <div class="peer-label" id="dm-peer-name"></div>
    </div>
  </div>
  <div class="messages" id="dm-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="dm-input" placeholder="send a message into the void..." maxlength="500"/>
    <button id="btn-dm-send">SEND</button>
  </div>
</div>

<div id="online-count">// <span id="online-num">?</span> souls in the void</div>

// ── Canvas BG ──
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
let W,H,particles=[],orbs=[];
function resize(){
  W=canvas.width=innerWidth;H=canvas.height=innerHeight;
  particles.length=0;
  for(let i=0;i<220;i++)particles.push(mkParticle());
  orbs.length=0;
  for(let i=0;i<8;i++)orbs.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*80+40,hue:Math.random()*360,a:Math.random()*Math.PI*2});
}
function mkParticle(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,r:Math.random()*3.5+.8,a:Math.random()*Math.PI*2,hue:Math.random()*360,pulse:Math.random()*Math.PI*2};}

resize();window.addEventListener('resize',resize);

let frame=0;
function drawBg(){
  frame++;
  ctx.fillStyle='rgba(2,0,5,0.08)';ctx.fillRect(0,0,W,H);

  // big glow orbs
  orbs.forEach(o=>{
    o.x+=o.vx;o.y+=o.vy;o.hue+=.8;o.a+=.01;
    if(o.x<-o.r)o.x=W+o.r;if(o.x>W+o.r)o.x=-o.r;
    if(o.y<-o.r)o.y=H+o.r;if(o.y>H+o.r)o.y=-o.r;
    const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*(1+Math.sin(o.a)*.3));
    g.addColorStop(0,`hsla(${o.hue},100%,65%,0.18)`);
    g.addColorStop(1,`hsla(${o.hue+60},100%,50%,0)`);
    ctx.beginPath();ctx.arc(o.x,o.y,o.r*(1+Math.sin(o.a)*.3),0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  });

  // particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.a+=.012;p.pulse+=.05;p.hue+=1.2;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    const sz=p.r*(1+Math.sin(p.pulse)*.4);
    // glow
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*5);
    g.addColorStop(0,`hsla(${p.hue},100%,75%,0.6)`);
    g.addColorStop(1,`hsla(${p.hue},100%,60%,0)`);
    ctx.beginPath();ctx.arc(p.x,p.y,sz*5,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    // core
    ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);
    ctx.fillStyle=`hsl(${p.hue},100%,90%)`;ctx.fill();
    // trail
    for(let t=1;t<=4;t++){
      ctx.beginPath();ctx.arc(p.x-p.vx*t*2,p.y-p.vy*t*2,sz*(1-t*.2),0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue+t*20},100%,70%,${.3-t*.06})`;ctx.fill();
    }
  });

  // strobe flash every ~4s
  if(frame%240<3){
    ctx.fillStyle=`hsla(${frame*7},100%,80%,0.04)`;
    ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(drawBg);
}
drawBg();

// ── Taglines ──
const taglines=["you are not alone. but you are.","somewhere someone is also staring into nothing.","the void stares back. it is warm.","connection is a strange word for this.","hello? ...hello?","two shapes in the dark.","speak and be heard by no one you know.","this is real. probably.","are you still there?","the signal is weak. so are you."];
let ti=0;
function rotateTags(){document.getElementById('tagline').textContent=taglines[ti++%taglines.length];setTimeout(rotateTags,3200);}
rotateTags();

// ── Country select ──
const sel=document.getElementById('country-select');
COUNTRIES.forEach(c=>{const o=document.createElement('option');o.value=c.code;o.textContent=`${c.flag}  ${c.name}`;sel.appendChild(o);});
sel.value='GB';
let myCountry=COUNTRIES.find(c=>c.code==='GB');

const crypticLabels=["// coordinates corrupted","// signal traced... maybe","// you are somewhere","// location: the dark","// narrowing the void","// a country. perhaps.","// found you. or did i.","// the void knows now."];
sel.addEventListener('change',()=>{
  myCountry=COUNTRIES.find(c=>c.code===sel.value)||COUNTRIES[0];
  const lbl=document.getElementById('flag-label');
  lbl.classList.add('glitch');
  lbl.textContent=crypticLabels[Math.floor(Math.random()*crypticLabels.length)];
  setTimeout(()=>{lbl.classList.remove('glitch');lbl.textContent=`// you are: ${myCountry.flag} ${myCountry.name}`;},500);
});

// ── State ──
const uid='user_'+Math.random().toString(36).slice(2,10);
let sessionId=null,peerId=null,peerCountry=null,queueRef=null,typingTimer=null,activeDmPeer=null;
let sessionListener=null,msgListener=null,typingListener=null;

// ── Screens ──
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

// ── Presence ──
const presRef=db.ref(`presence/${uid}`);
presRef.set({online:true,ts:Date.now()});
presRef.onDisconnect().remove();
db.ref('presence').on('value',snap=>{
  document.getElementById('online-num').textContent=snap.exists()?Object.keys(snap.val()).length:0;
});

// ── Enter void ──
document.getElementById('btn-enter').addEventListener('click',enterVoid);
function enterVoid(){
  show('queue-screen');
  db.ref('queue').once('value').then(snap=>{
    let matched=false;
    if(snap.exists()){
      const entries=Object.entries(snap.val());
      for(const [wid,wdata] of entries){
        if(wid===uid)continue;
        matched=true;
        peerId=wid;
        peerCountry=wdata.country;
        db.ref(`queue/${wid}`).remove();
        const sess={[uid]:myCountry,[wid]:peerCountry,created:Date.now()};
        const sessRef=db.ref('sessions').push();
        sessRef.set(sess).then(()=>{sessionId=sessRef.key;startChat();});
        break;
      }
    }
    if(!matched){
      queueRef=db.ref(`queue/${uid}`);
      queueRef.set({country:myCountry,ts:Date.now()});
      queueRef.onDisconnect().remove();
      watchForSession();
    }
  });
}

function watchForSession(){
  sessionListener=db.ref('sessions').on('value',snap=>{
    if(!snap.exists())return;
    const sessions=snap.val();
    for(const [sid,data] of Object.entries(sessions)){
      const keys=Object.keys(data).filter(k=>k!=='created');
      if(keys.includes(uid)){
        db.ref('sessions').off('value',sessionListener);
        sessionId=sid;
        peerId=keys.find(k=>k!==uid);
        peerCountry=data[peerId];
        startChat();
        return;
      }
    }
  });
}

function startChat(){
  document.getElementById('peer-flag').textContent=peerCountry?.flag||'👁';
  document.getElementById('peer-country-name').textContent=`// ${peerCountry?.name||'the void'}`;
  document.getElementById('messages').innerHTML='<div class="system-msg">// you have found each other in the dark</div>';
  show('chat-screen');
  listenMessages();
  listenTyping();
  listenPeerDisconnect();
}

function listenMessages(){
  db.ref(`sessions/${sessionId}/messages`).on('child_added',snap=>{appendMsg(snap.val());});
}
function listenTyping(){
  db.ref(`sessions/${sessionId}/typing/${peerId}`).on('value',snap=>{
    document.getElementById('typing-indicator').classList.toggle('visible',snap.exists()&&snap.val()===true);
  });
}
function listenPeerDisconnect(){
  db.ref(`sessions/${sessionId}`).on('value',snap=>{
    if(!snap.exists()){
      const s=document.getElementById('chat-status');
      s.textContent='// they dissolved back into the void';
      s.style.color='var(--danger)';
    }
  });
}

function appendMsg(msg){
  const div=document.createElement('div');
  div.className=`msg ${msg.uid===uid?'mine':'theirs'}`;
  const flag=msg.uid===uid?(myCountry?.flag||'👁'):(peerCountry?.flag||'👁');
  const time=new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML=`<span class="msg-flag">${flag}</span>${esc(msg.text)}<span class="msg-time">${time}</span>`;
  const msgs=document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

document.getElementById('btn-send').addEventListener('click',sendMsg);
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg();else setTyping(true);});
document.getElementById('chat-input').addEventListener('blur',()=>setTyping(false));
function sendMsg(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text||!sessionId)return;
  inp.value='';setTyping(false);
  db.ref(`sessions/${sessionId}/messages`).push({uid,text,ts:Date.now()});
}
function setTyping(v){
  if(!sessionId)return;
  clearTimeout(typingTimer);
  db.ref(`sessions/${sessionId}/typing/${uid}`).set(v);
  if(v)typingTimer=setTimeout(()=>setTyping(false),3000);
}

document.getElementById('btn-dm').addEventListener('click',()=>{
  if(!peerId)return;
  const dmId=[uid,peerId].sort().join('_');
  activeDmPeer={id:peerId,country:peerCountry,dmId};
  openDmConvo(activeDmPeer);
});
document.getElementById('btn-leave').addEventListener('click',leaveChat);
function leaveChat(){
  if(sessionId){db.ref(`sessions/${sessionId}`).remove();sessionId=null;}
  if(queueRef){queueRef.remove();queueRef=null;}
  peerId=null;peerCountry=null;
  show('landing');
}
document.getElementById('btn-cancel-queue').addEventListener('click',()=>{
  if(queueRef){queueRef.remove();queueRef=null;}
  db.ref('sessions').off('value',sessionListener);
  show('landing');
});

// ── DM ──
document.getElementById('btn-open-dm').addEventListener('click',openDmInbox);
document.getElementById('btn-back-from-dm').addEventListener('click',()=>show('landing'));
document.getElementById('btn-back-from-convo').addEventListener('click',openDmInbox);

function openDmInbox(){
  show('dm-screen');
  const list=document.getElementById('dm-list');
  list.innerHTML='<div class="empty-state">// scanning the void...</div>';
  db.ref('dms').once('value').then(snap=>{
    list.innerHTML='';
    if(!snap.exists()){list.innerHTML='<div class="empty-state">// no echoes yet</div>';return;}
    let found=false;
    for(const [dmId,convo] of Object.entries(snap.val())){
      if(!dmId.includes(uid))continue;
      found=true;
      const msgs=convo.messages?Object.values(convo.messages).sort((a,b)=>b.ts-a.ts):[];
      const last=msgs[0];
      const otherId=dmId.split('_').find(k=>k!==uid.replace('user_',''))?dmId.replace(uid,'').replace(/^_|_$/g,''):dmId.split('_').filter(p=>!uid.includes(p)).join('_');
      const otherCountry=convo.countries?.[otherId]||{flag:'👁',name:'the void'};
      const item=document.createElement('div');
      item.className='dm-item';
      item.innerHTML=`<div class="dm-flag">${otherCountry.flag||'👁'}</div><div class="dm-info"><div class="dm-name">stranger // ${otherCountry.name||'void'}</div><div class="dm-preview">${last?esc(last.text.slice(0,40))+'...':'// silence'}</div></div>`;
      item.addEventListener('click',()=>{activeDmPeer={id:otherId,country:otherCountry,dmId};openDmConvo(activeDmPeer);});
      list.appendChild(item);
    }
    if(!found)list.innerHTML='<div class="empty-state">// no echoes yet</div>';
  });
}

function openDmConvo(peer){
  document.getElementById('dm-peer-flag').textContent=peer.country?.flag||'👁';
  document.getElementById('dm-peer-name').textContent=`stranger // ${peer.country?.name||'void'}`;
  const msgs=document.getElementById('dm-messages');
  msgs.innerHTML='';
  show('dm-convo-screen');
  db.ref(`dms/${peer.dmId}/countries`).update({[uid]:myCountry,[peer.id]:peer.country});
  db.ref(`dms/${peer.dmId}/messages`).off();
  db.ref(`dms/${peer.dmId}/messages`).on('child_added',snap=>{
    const msg=snap.val();
    const div=document.createElement('div');
    div.className=`msg ${msg.uid===uid?'mine':'theirs'}`;
    const flag=msg.uid===uid?(myCountry?.flag||'👁'):(peer.country?.flag||'👁');
    const time=new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    div.innerHTML=`<span class="msg-flag">${flag}</span>${esc(msg.text)}<span class="msg-time">${time}</span>`;
    msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
  });
}

document.getElementById('btn-dm-send').addEventListener('click',sendDmMsg);
document.getElementById('dm-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendDmMsg();});
function sendDmMsg(){
  if(!activeDmPeer)return;
  const inp=document.getElementById('dm-input');
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  db.ref(`dms/${activeDmPeer.dmId}/messages`).push({uid,text,ts:Date.now()});
}

setInterval(()=>{
  db.ref('queue').once('value').then(snap=>{
    const n=snap.exists()?Object.keys(snap.val()).length:0;
    document.getElementById('queue-count').textContent=n>0?`(${n} searching...)`:'';
  });
},3000);

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
</script>
</body>
</html>
